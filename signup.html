<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account | The Cinnamon Kitchen</title>
  <link rel="stylesheet" href="static/tck.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="promo-bar">Code <strong>15PARTY</strong></div>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="header-logo"><img src="https://via.placeholder.com/144x44/2d2a26/ffffff?text=TCK" alt="TCK" width="144" height="44"></a>
      <nav class="header-nav"><a href="shop-all.html">Shop All</a><a href="about.html">About Us</a></nav>
      <div class="header-actions"><a href="login.html" class="login-link">Sign in</a><a href="cart.html" class="cart-link">Cart <span class="cart-count" id="header-cart-count">0</span> items</a></div>
    </div>
  </header>
  <main class="form-page">
    <h1>Create account</h1>
    <form action="#" method="post">
      <div class="form-group"><label for="name">Name</label><input type="text" id="name" name="name" placeholder="Your name" required></div>
      <div class="form-group"><label for="email">Email</label><input type="email" id="email" name="email" placeholder="your@email.com" required></div>
      <div class="form-group"><label for="password">Password</label><input type="password" id="password" name="password" placeholder="Password" required></div>
      <button type="submit" class="btn-primary">Create</button>
    </form>
    <p class="form-footer">Already have an account? <a href="login.html">Log in</a></p>
  </main>
  <footer class="site-footer"><div class="footer-bottom"><p>2025 The Cinnamon Kitchen.</p></div></footer>
  <script src="static/tck.js"></script>
</body>
</html>
